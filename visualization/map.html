<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin: 0; padding: 0; }
  #map { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map').setView([0, 0], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

var marker = L.marker([0, 0], { draggable: false }).addTo(map);
var circle = L.circle([0, 0], { radius: 1, color: '#ff4444', weight: 2, fillColor: '#ff4444', fillOpacity: 0.25 }).addTo(map);
var path = L.polyline([], { color: '#00cc88', weight: 3, opacity: 0.7 }).addTo(map);
var trail = [];

function updatePosition(lat, lon, yaw, accuracy) {
  map.setView([lat, lon], map.getZoom());
  marker.setLatLng([lat, lon]);
  var r = Math.max(accuracy || 1, 0.5);
  circle.setLatLng([lat, lon]);
  circle.setRadius(r);
  trail.push([lat, lon]);
  if (trail.length > 1000) trail.shift();
  path.setLatLngs(trail);
}
</script>
</body>
</html>
